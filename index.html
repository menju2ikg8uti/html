<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>price</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}
</style>
</head>
<body>

<h2>DOGE/USD</h2>
<p id="price">(connecting...)</p>
<p id="status"></p>

<script>
// koneksi ke EDGE (futures)
const ws = new WebSocket("wss://contract.mexc.com/edge");

ws.onopen = () => {
    document.getElementById("status").innerText = "Connected";

    ws.send(JSON.stringify({
        method: "sub.ticker",
        param: {
            symbol: "DOGE_USDT"
        }
    }));
};

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.data && data.data.lastPrice) {
        const price = parseFloat(data.data.lastPrice);

        document.getElementById("price").innerText = "(" + price + ")";

        // update title realtime
        document.title = price;
    }
};

ws.onerror = () => {
    document.getElementById("status").innerText = "Error";
};

ws.onclose = () => {
    document.getElementById("status").innerText = "Disconnected";
    setTimeout(() => location.reload(), 3000);
};
</script>

</body>
</html>
