<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Repo Tree Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --border: #30363d;
      --hover: #161b22;
      --btn: #238636;
    }
    body.light {
      --bg: #ffffff;
      --fg: #24292f;
      --border: #d0d7de;
      --hover: #f6f8fa;
      --btn: #2da44e;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    li:hover { background: var(--hover); }
    .name { cursor: pointer; }
    .btn {
      margin-left: auto;
      background: var(--btn);
      border: none;
      color: white;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <header>
    📁 Repo Browser (tree.json)
    <button id="theme" class="btn">🌙</button>
  </header>

  <ul id="list"></ul>

  <script>
    const list = document.getElementById('list');
    const themeBtn = document.getElementById('theme');

    // theme
    if (localStorage.theme === 'light') document.body.classList.add('light');
    themeBtn.onclick = () => {
      document.body.classList.toggle('light');
      localStorage.theme = document.body.classList.contains('light') ? 'light' : 'dark';
    };

    // load tree.json (NO GitHub API)
    fetch('./tree.json')
      .then(r => r.json())
      .then(data => render(data));

    function render(items) {
      list.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        const name = document.createElement('span');
        name.textContent = item.type === 'dir' ? '📁 ' + item.path : '📄 ' + item.path;
        name.className = 'name';
        li.appendChild(name);

        if (item.type === 'file') {
          const btn = document.createElement('button');
          btn.textContent = '📋';
          btn.className = 'btn';
          btn.onclick = async () => {
            btn.disabled = true;
            const res = await fetch(item.raw);
            const text = await res.text();
            await navigator.clipboard.writeText(text);
            btn.textContent = '✅';
            setTimeout(() => { btn.textContent = '📋'; btn.disabled = false; }, 1000);
          };
          li.appendChild(btn);
        }
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
