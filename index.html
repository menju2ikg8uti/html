<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MEXC Raw Output</title>

<style>
  body {
    background: #111;
    color: #0f0;
    font-family: monospace;
    padding: 10px;
  }
  #log {
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>

<h3>MEXC XRPUSDT Raw Stream</h3>
<div id="log"></div>

<script>
let wsMEXC;
const log = document.getElementById("log");

function write(data) {
    log.textContent += data + "\n";
    window.scrollTo(0, document.body.scrollHeight);
}

function connectMEXC() {
    if (wsMEXC) wsMEXC.close();

    write("Connecting...");

    wsMEXC = new WebSocket("wss://wbs-api.mexc.com/ws");

    wsMEXC.onopen = () => {
        write("Connected");

        wsMEXC.send(JSON.stringify({
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@10ms@XRPUSDT"]
        }));
    };

    wsMEXC.onmessage = (event) => {
        write(event.data);
    };

    wsMEXC.onerror = (err) => {
        write("Error: " + JSON.stringify(err));
    };

    wsMEXC.onclose = () => {
        write("Disconnected. Reconnecting in 3s...");
        setTimeout(connectMEXC, 3000);
    };
}

connectMEXC();
</script>

</body>
</html>
