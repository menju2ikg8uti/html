<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DOGE Live Chart</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}
.container {
    width: 90%;
    margin: auto;
}
canvas {
    background: white;
    border-radius: 10px;
}
</style>

</head>
<body>

<div class="container">
    <h2>DOGE/USDT Live Chart (MEXC)</h2>
    <p id="price">Loading...</p>
    <p id="time"></p>

    <canvas id="chart" height="100"></canvas>
</div>

<script>
let prices = [];
let labels = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'DOGE Price',
            data: prices,
            borderWidth: 2,
            tension: 0.2
        }]
    },
    options: {
        responsive: true,
        scales: {
            x: {
                ticks: { color: 'black' }
            },
            y: {
                ticks: { color: 'black' }
            }
        }
    }
});

async function getPrice() {
    try {
        const res = await fetch("https://api.mexc.com/api/v3/ticker/price?symbol=DOGEUSDT");
        const data = await res.json();

        const price = parseFloat(data.price);
        const now = new Date().toLocaleTimeString();

        // update UI
        document.getElementById("price").innerText = "Price: " + price + " USDT";
        document.getElementById("time").innerText = "Update: " + now;

        // simpan data
        prices.push(price);
        labels.push(now);

        // batasi data biar ga berat (max 50 titik)
        if (prices.length > 50) {
            prices.shift();
            labels.shift();
        }

        chart.update();

    } catch (err) {
        console.error(err);
    }
}

// load pertama
getPrice();

// update tiap 5 menit
setInterval(getPrice, 300000);
</script>

</body>
</html>
