<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="favicon" rel="icon">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
}

#price {
    font-size: 48px;
    margin: 10px;
}

#percent {
    font-size: 24px;
    margin-bottom: 20px;
}

canvas {
    max-width: 800px;
    width: 100%;
}
</style>
</head>

<body>

<div id="price">-</div>
<div id="percent">-</div>
<canvas id="chart"></canvas>

<script>
let wsMEXC;
let lastPrice = null;
let basePrice = null;

const priceEl = document.getElementById("price");
const percentEl = document.getElementById("percent");

function setFavicon(color) {
    const canvas = document.createElement("canvas");
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 32, 32);

    document.getElementById("favicon").href = canvas.toDataURL("image/png");
}

// Chart setup
const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "XRP/USDT",
            data: [],
            borderColor: "#00ffcc",
            borderWidth: 2,
            pointRadius: 0
        }]
    },
    options: {
        animation: false,
        responsive: true,
        scales: {
            x: {
                ticks: { display: false }
            }
        }
    }
});

function connectMEXC() {
    if (wsMEXC) wsMEXC.close();

    document.title = "Connecting...";
    setFavicon("#888888");

    wsMEXC = new WebSocket("wss://wbs-api.mexc.com/ws");

    wsMEXC.onopen = () => {
        wsMEXC.send(JSON.stringify({
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@10ms@XRPUSDT"]
        }));
    };

    wsMEXC.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);

            if (!data.d || !data.d.deals) return;

            const price = parseFloat(data.d.deals[0].p);
            if (!price) return;

            if (!basePrice) basePrice = price;

            // Update UI
            priceEl.textContent = price.toFixed(4);
            document.title = price.toFixed(4);

            const percent = ((price - basePrice) / basePrice) * 100;
            percentEl.textContent = percent.toFixed(4) + "%";

            // Color logic
            if (lastPrice !== null) {
                if (price > lastPrice) {
                    priceEl.style.color = "#00ff00";
                    setFavicon("#00ff00");
                } else if (price < lastPrice) {
                    priceEl.style.color = "#ff0000";
                    setFavicon("#ff0000");
                }
            }

            lastPrice = price;

            // Update chart
            const time = new Date().toLocaleTimeString();

            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(price);

            if (chart.data.labels.length > 100) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update();

        } catch (e) {}
    };

    wsMEXC.onclose = () => {
        setTimeout(connectMEXC, 2000);
    };

    wsMEXC.onerror = () => {
        wsMEXC.close();
    };
}

connectMEXC();
</script>

</body>
</html>
