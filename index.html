<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>price</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}
</style>
</head>
<body>

<h2>DOGE/USD</h2>
<p id="price">(connecting...)</p>
<p id="status"></p>

<script>
let ws;
let reconnectDelay = 5000; // mulai 5 detik
const maxDelay = 30000;    // maksimal 30 detik

function connectWS() {
    ws = new WebSocket("wss://contract.mexc.com/edge");

    ws.onopen = () => {
        document.getElementById("status").innerText = "Connected";

        // reset delay kalau sukses connect
        reconnectDelay = 5000;

        ws.send(JSON.stringify({
            method: "sub.ticker",
            param: {
                symbol: "DOGE_USDT"
            }
        }));
    };

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);

        if (data.data && data.data.lastPrice) {
            const price = parseFloat(data.data.lastPrice);

            document.getElementById("price").innerText = "(" + price + ")";
            document.title = price;
        }
    };

    ws.onerror = () => {
        document.getElementById("status").innerText = "Error";
        ws.close();
    };

    ws.onclose = () => {
        document.getElementById("status").innerText = "Reconnect in " + (reconnectDelay/1000) + "s";

        setTimeout(() => {
            connectWS();
        }, reconnectDelay);

        // naikkan delay (exponential)
        reconnectDelay = Math.min(reconnectDelay * 2, maxDelay);
    };
}

// start pertama
connectWS();
</script>

</body>
</html>
