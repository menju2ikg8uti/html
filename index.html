<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Repo File Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --border: #30363d;
      --hover: #161b22;
      --prebg: #010409;
      --btn: #238636;
      --btnhover: #2ea043;
    }
    body.light {
      --bg: #ffffff;
      --fg: #24292f;
      --border: #d0d7de;
      --hover: #f6f8fa;
      --prebg: #f6f8fa;
      --btn: #2da44e;
      --btnhover: #2c974b;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    #path { font-size: 14px; color: #8b949e; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    li:hover { background: var(--hover); }
    .icon { width: 20px; margin-right: 10px; opacity: 0.8; }
    pre {
      background: var(--prebg);
      padding: 16px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    button {
      background: var(--btn);
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: var(--btnhover); }
    #viewer { padding: 16px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <header>
    📁 GitHub Repo Browser
    <div id="path">/</div>
    <button id="themeToggle" style="float:right;margin-top:-24px">🌙 Dark</button>
  </header>

  <ul id="fileList"></ul>

  <div id="viewer" style="display:none">
    <button id="copyBtn">📋 Copy file content</button>
    <pre id="content"></pre>
  </div>

  <script>
    const owner = "menju2ikg8uti";
    const repo = "code";
    let currentPath = "";

    async function loadPath(path = "") {
      currentPath = path;
      document.getElementById("path").textContent = "/" + path;
      document.getElementById("viewer").style.display = "none";

      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
      const data = await res.json();

      const list = document.getElementById("fileList");
      list.innerHTML = "";

      if (path) {
        const up = document.createElement("li");
        up.innerHTML = "⬅️ ..";
        up.onclick = () => loadPath(path.split('/').slice(0, -1).join('/'));
        list.appendChild(up);
      }

      data.forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `<span class=\"icon\">${item.type === 'dir' ? '📁' : '📄'}</span>${item.name}`;
        li.onclick = () => {
          if (item.type === "dir") {
            loadPath(item.path);
          } else {
            loadFile(item.download_url);
          }
        };
        list.appendChild(li);
      });
    }

    async function loadFile(url) {
      const res = await fetch(url);
      const text = await res.text();
      document.getElementById("content").textContent = text;
      document.getElementById("viewer").style.display = "block";

      document.getElementById("copyBtn").onclick = () => {
        navigator.clipboard.writeText(text);
        alert("Copied!");
      };
    }

    loadPath();

    const toggle = document.getElementById("themeToggle");
    const saved = localStorage.getItem("theme");
    if (saved === "light") {
      document.body.classList.add("light");
      toggle.textContent = "🌞 Light";
    }

    toggle.onclick = () => {
      document.body.classList.toggle("light");
      const isLight = document.body.classList.contains("light");
      toggle.textContent = isLight ? "🌞 Light" : "🌙 Dark";
      localStorage.setItem("theme", isLight ? "light" : "dark");
    };
  </script>
</body>
</html>
