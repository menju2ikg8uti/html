name: Generate tree.json

on:
  workflow_dispatch:
jobs:
  build-tree:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo INI (buat commit tree.json)
      - name: Checkout pages repo
        uses: actions/checkout@v4

      # 2️⃣ Clone repo TARGET (buat discan)
      - name: Clone target repo
        run: |
          git clone --depth=1 https://github.com/menju2ikg8uti/code.git repo

      # 3️⃣ Generate tree.json
      - name: Generate tree.json
        run: |
          REPO="menju2ikg8uti/code"
          BRANCH="main"

          echo "[" > tree.json
          cd repo

          # folders
          find . -type d \
            ! -path "./.git*" \
            | sed 's|^./||' \
            | grep -v '^$' \
            | while read dir; do
                echo "  {\"type\":\"dir\",\"path\":\"$dir\"}," >> ../tree.json
              done

          # files
          find . -type f \
            ! -path "./.git/*" \
            | sed 's|^./||' \
            | while read file; do
                echo "  {\"type\":\"file\",\"path\":\"$file\",\"raw\":\"https://raw.githubusercontent.com/$REPO/$BRANCH/$file\"}," >> ../tree.json
              done

          cd ..
          sed -i '$ s/,$//' tree.json
          echo "]" >> tree.json

      # 4️⃣ Commit tree.json (SEKARANG AMAN)
      - name: Commit tree.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update tree.json"
          file_pattern: tree.json
