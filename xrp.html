<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="favicon" rel="icon">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  h3 {
    margin-bottom: 10px;
  }

  input {
    font-size: 1rem;
    padding: 5px;
    margin-bottom: 10px;
    width: 150px;
    text-align: center;
  }

  button {
    font-size: 0.9rem;
    padding: 5px 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  pre {
    font-size: 2rem;
    margin: 10px 0 20px 0;
  }

  canvas {
    max-width: 900px;
    width: 100%;
  }

  #lastUpdate {
    margin-top: 10px;
    font-size: 0.9rem;
    color: #aaaaaa;
  }
</style>
</head>
<body>

<h3>Latest XRP/USDT Price</h3>

<input id="basePrice" type="number" step="0.0001" placeholder="Base price">
<input id="topPrice" type="number" step="0.0001" placeholder="Price atas">
<input id="bottomPrice" type="number" step="0.0001" placeholder="Price bawah">

<button id="confirmBtn">Confirm</button>
<button id="reconnectBtn">Reconnect</button>

<pre id="output">Connecting...</pre>

<canvas id="chart"></canvas>
<div id="lastUpdate">Loading chart...</div>

<script>
let userBasePrice = null;
let topPrice = null;
let bottomPrice = null;

let topHit = false;
let bottomHit = false;

let ws = null;
let chart = null;

const output = document.getElementById("output");
const baseInput = document.getElementById("basePrice");
const topInput = document.getElementById("topPrice");
const bottomInput = document.getElementById("bottomPrice");

const reconnectBtn = document.getElementById("reconnectBtn");
const confirmBtn = document.getElementById("confirmBtn");
const favicon = document.getElementById("favicon");
const ctx = document.getElementById('chart').getContext('2d');

const LOG_URL = "https://raw.githubusercontent.com/menju2ikg8uti/exchange-api/main/usdt_log.txt";

// ===== FAVICON 3 LAYER =====
function createFavicon(baseColor) {
    const canvas = document.createElement("canvas");
    canvas.width = 64;
    canvas.height = 64;

    const ctx = canvas.getContext("2d");

    // Layer 1 (base circle)
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.arc(32, 32, 30, 0, Math.PI * 2);
    ctx.fill();

    // Layer 2 (top indicator)
    ctx.fillStyle = topHit ? "#00ff00" : "#000000";
    ctx.fillRect(10, 5, 44, 10);

    // Layer 3 (bottom indicator)
    ctx.fillStyle = bottomHit ? "#00ff00" : "#000000";
    ctx.fillRect(10, 49, 44, 10);

    return canvas.toDataURL("image/png");
}

function updateFavicon(baseColor) {
    favicon.href = createFavicon(baseColor);
}

// ===== BASE / LIMIT =====
function setBasePrice() {
    const baseVal = parseFloat(baseInput.value);
    const topVal = parseFloat(topInput.value);
    const botVal = parseFloat(bottomInput.value);

    userBasePrice = (!isNaN(baseVal) && baseVal > 0) ? baseVal : null;
    topPrice = (!isNaN(topVal) && topVal > 0) ? topVal : null;
    bottomPrice = (!isNaN(botVal) && botVal > 0) ? botVal : null;

    // reset trigger
    topHit = false;
    bottomHit = false;
}

confirmBtn.addEventListener("click", setBasePrice);

// ===== WEBSOCKET =====
function connectWS() {
    if (ws) ws.close();

    output.textContent = "Connecting...";
    document.title = "Connecting...";
    updateFavicon("#888888");

    ws = new WebSocket("wss://wbs-api.mexc.com/ws");

    ws.onopen = () => {
        ws.send(JSON.stringify({
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@100ms@XRPUSDT"]
        }));
    };

    ws.onmessage = async (event) => {
        let raw = event.data instanceof Blob ? await event.data.text() : event.data;
        const clean = raw.replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        const prices = clean.match(/\d+\.\d+/g);

        if (!prices) return;

        const filtered = prices.filter(p => parseFloat(p) >= 0.1 && parseFloat(p) <= 5);
        if (filtered.length === 0) return;

        const lastPrice = parseFloat(filtered[filtered.length - 1]);

        // ===== trigger logic =====
        if (topPrice && lastPrice >= topPrice) topHit = true;
        if (bottomPrice && lastPrice <= bottomPrice) bottomHit = true;

        let baseColor = "#ffffff";
        let displayText = lastPrice.toFixed(4);

        if (userBasePrice !== null) {
            const percent = ((lastPrice - userBasePrice) / userBasePrice) * 100;
            const sign = percent >= 0 ? "+" : "";
            displayText += ` (${sign}${percent.toFixed(2)}%)`;

            baseColor = percent >= 0 ? "#00ff00" : "#ff5555";
            output.style.color = baseColor;
        } else {
            output.style.color = "#ffffff";
        }

        updateFavicon(baseColor);

        output.textContent = displayText;
        document.title = displayText;
    };
}

reconnectBtn.addEventListener("click", connectWS);

// ===== CHART =====
async function loadChart() {
    try {
        const res = await fetch(LOG_URL + "?t=" + Date.now());
        const text = await res.text();

        const lines = text.split("\n").map(x => x.trim()).filter(x => x !== "");

        const labels = [];
        const rawData = [];

        lines.forEach(line => {
            const parts = line.split("|");
            if (parts.length === 2) {
                const time = parts[0].trim();
                const value = parseFloat(parts[1].trim());
                if (!isNaN(value)) {
                    labels.push(time);
                    rawData.push(value);
                }
            }
        });

        if (rawData.length === 0) return;

        const base = rawData[0];
        const profitData = rawData.map(v => parseFloat((v - base).toFixed(4)));

        if (!chart) {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Profit (USDT)',
                        data: profitData,
                        borderWidth: 2,
                        tension: 0.2
                    }]
                },
                options: {
                    plugins: {
                        legend: { labels: { color: "#ffffff" } }
                    },
                    scales: {
                        x: { ticks: { color: "#ffffff" } },
                        y: { ticks: { color: "#ffffff" } }
                    }
                }
            });
        } else {
            chart.data.labels = labels;
            chart.data.datasets[0].data = profitData;
            chart.update();
        }

        document.getElementById("lastUpdate").textContent =
            "Last update: " + new Date().toLocaleTimeString();

    } catch {
        document.getElementById("lastUpdate").textContent = "Error loading chart";
    }
}

// ===== INIT =====
connectWS();
loadChart();
setInterval(loadChart, 600000);
</script>

</body>
</html>
