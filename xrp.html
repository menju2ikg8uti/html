<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="favicon" rel="icon">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  h3 {
    margin-bottom: 10px;
  }

  input {
    font-size: 1rem;
    padding: 5px;
    margin-bottom: 5px;
    width: 150px;
    text-align: center;
  }

  button {
    font-size: 0.9rem;
    padding: 5px 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  pre {
    font-size: 2rem;
    margin: 10px 0 20px 0;
  }

  canvas {
    max-width: 900px;
    width: 100%;
  }

  #lastUpdate {
    margin-top: 10px;
    font-size: 0.9rem;
    color: #aaaaaa;
  }
</style>
</head>
<body>

<h3>Latest XRP/USDT Price</h3>

<input id="basePrice" type="number" step="0.0001" placeholder="Base price">
<input id="topPrice" type="number" step="0.0001" placeholder="Top price">
<input id="bottomPrice" type="number" step="0.0001" placeholder="Bottom price">

<button id="confirmBtn">Confirm</button>
<button id="reconnectBtn">Reconnect</button>

<pre id="output">Connecting...</pre>

<canvas id="chart"></canvas>
<div id="lastUpdate">Loading chart...</div>

<script>
let userBasePrice = null;
let topPrice = null;
let bottomPrice = null;

let hitTop = false;
let hitBottom = false;

let ws = null;
let chart = null;

const output = document.getElementById("output");
const baseInput = document.getElementById("basePrice");
const topInput = document.getElementById("topPrice");
const bottomInput = document.getElementById("bottomPrice");
const reconnectBtn = document.getElementById("reconnectBtn");
const confirmBtn = document.getElementById("confirmBtn");
const favicon = document.getElementById("favicon");
const ctx = document.getElementById('chart').getContext('2d');

const LOG_URL = "https://raw.githubusercontent.com/menju2ikg8uti/exchange-api/main/usdt_log.txt";

// ===== FAVICON (3 DOTS) =====
function setFaviconMulti(color1, color2, color3) {
    const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
        <circle cx="16" cy="32" r="10" fill="${color1}"/>
        <circle cx="32" cy="32" r="10" fill="${color2}"/>
        <circle cx="48" cy="32" r="10" fill="${color3}"/>
    </svg>`;

    favicon.href = "data:image/svg+xml;base64," + btoa(svg);
}

// ===== BASE / TARGET =====
function setBasePrice() {
    const base = parseFloat(baseInput.value);
    const top = parseFloat(topInput.value);
    const bottom = parseFloat(bottomInput.value);

    userBasePrice = (!isNaN(base) && base > 0) ? base : null;
    topPrice = (!isNaN(top) && top > 0) ? top : null;
    bottomPrice = (!isNaN(bottom) && bottom > 0) ? bottom : null;

    // reset trigger
    hitTop = false;
    hitBottom = false;
}

confirmBtn.addEventListener("click", setBasePrice);

// ===== WEBSOCKET =====
function connectWS() {
    if (ws) ws.close();

    output.textContent = "Connecting...";
    document.title = "Connecting...";
    setFaviconMulti("#888888", "#000000", "#000000");

    ws = new WebSocket("wss://wbs-api.mexc.com/ws");

    ws.onopen = () => {
        ws.send(JSON.stringify({
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@100ms@XRPUSDT"]
        }));
    };

    ws.onmessage = async (event) => {
        let raw = event.data instanceof Blob ? await event.data.text() : event.data;
        const clean = raw.replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        const prices = clean.match(/\d+\.\d+/g);

        if (prices && prices.length > 0) {
            const lastPrice = parseFloat(prices[prices.length - 1]);

            let displayText = lastPrice.toFixed(4);

            // ===== ICON COLORS =====
            let colorPercent = "#ffffff";
            let colorTop = "#000000";
            let colorBottom = "#000000";

            if (userBasePrice !== null) {
                const percent = ((lastPrice - userBasePrice) / userBasePrice) * 100;
                const sign = percent >= 0 ? "+" : "";

                displayText += ` (${sign}${percent.toFixed(2)}%)`;

                if (percent >= 0) {
                    colorPercent = "#00ff00";
                } else {
                    colorPercent = "#ff0000";
                }
            }

            // ===== TOP TRIGGER =====
            if (topPrice !== null && lastPrice >= topPrice) {
                hitTop = true;
            }

            // ===== BOTTOM TRIGGER =====
            if (bottomPrice !== null && lastPrice <= bottomPrice) {
                hitBottom = true;
            }

            if (hitTop) colorTop = "#00ff00";
            if (hitBottom) colorBottom = "#00ff00";

            setFaviconMulti(colorPercent, colorTop, colorBottom);

            output.textContent = displayText;
            document.title = displayText;
        }
    };
}

reconnectBtn.addEventListener("click", connectWS);

// ===== CHART =====
async function loadChart() {
    try {
        const res = await fetch(LOG_URL + "?t=" + Date.now());
        const text = await res.text();

        const lines = text.split("\n").filter(x => x.trim() !== "");

        const labels = [];
        const rawData = [];

        lines.forEach(line => {
            const parts = line.split("|");
            if (parts.length === 2) {
                const value = parseFloat(parts[1]);
                if (!isNaN(value)) {
                    labels.push(parts[0]);
                    rawData.push(value);
                }
            }
        });

        if (rawData.length === 0) return;

        const base = rawData[0];
        const profitData = rawData.map(v => v - base);

        if (!chart) {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Profit (USDT)',
                        data: profitData,
                        borderWidth: 2
                    }]
                }
            });
        } else {
            chart.data.labels = labels;
            chart.data.datasets[0].data = profitData;
            chart.update();
        }

        document.getElementById("lastUpdate").textContent =
            "Last update: " + new Date().toLocaleTimeString();

    } catch {
        document.getElementById("lastUpdate").textContent = "Error loading chart";
    }
}

connectWS();
loadChart();
setInterval(loadChart, 600000);
</script>

</body>
</html>
