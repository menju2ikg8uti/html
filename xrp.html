<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="favicon" rel="icon">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#1e1e1e;
  color:#fff;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
}
input,button{margin:5px;padding:5px}
pre{font-size:2rem}
canvas{max-width:900px;width:100%}
</style>
</head>
<body>

<h3>XRP/USDT</h3>

<input id="basePrice" placeholder="Base">
<input id="targetUp" placeholder="Target Atas">
<input id="targetDown" placeholder="Target Bawah">

<button onclick="setInputs()">Confirm</button>
<button onclick="reconnectAll()">Reconnect</button>

<pre id="output">Connecting...</pre>
<div id="binance">Binance: ...</div>

<canvas id="chart"></canvas>

<script>
let userBasePrice=null,targetUp=null,targetDown=null,hitState=null;
let ws=null,binanceWS=null;
let lastValidPrice=null;
let chart=null;

const output=document.getElementById("output");
const favicon=document.getElementById("favicon");
const ctx=document.getElementById("chart").getContext("2d");

const LOG_URL="https://raw.githubusercontent.com/menju2ikg8uti/exchange-api/main/usdt_log.txt";

// ===== FAVICON =====
function setFavicon(c){
 let canvas=document.createElement("canvas");
 canvas.width=64;canvas.height=64;
 let x=canvas.getContext("2d");
 x.fillStyle=c;x.beginPath();x.arc(32,32,30,0,Math.PI*2);x.fill();
 favicon.href=canvas.toDataURL();
}

// ===== INPUT =====
function setInputs(){
 userBasePrice=parseFloat(basePrice.value)||null;
 targetUp=parseFloat(targetUp.value)||null;
 targetDown=parseFloat(targetDown.value)||null;
 hitState=null;
}

// ===== ICON =====
function updateFavicon(p){
 if(hitState===null){
  if(targetUp&&p>=targetUp)hitState="up";
  if(targetDown&&p<=targetDown)hitState="down";
 }
 if(hitState==="up"){setFavicon("#00ff00");return;}
 if(hitState==="down"){setFavicon("#ff0000");return;}

 if(userBasePrice){
  let percent=(p-userBasePrice)/userBasePrice;
  setFavicon(percent>=0?"#00aa00":"#aa0000");
 }else setFavicon("#000000");
}

// ===== MEXC =====
function connectWS(){
 if(ws)ws.close();

 ws=new WebSocket("wss://wbs-api.mexc.com/ws");

 ws.onopen=()=>{
  ws.send(JSON.stringify({
   method:"SUBSCRIPTION",
   params:["spot@public.aggre.deals.v3.api.pb@10ms@XRPUSDT"]
  }));
 };

 ws.onmessage=async(e)=>{
  let raw=e.data instanceof Blob?await e.data.text():e.data;

  let prices=raw.match(/\d+\.\d+/g);
  if(!prices)return;

  let filtered=prices.map(Number).filter(v=>v>0.1&&v<5);
  if(!filtered.length)return;

  let price=filtered.at(-1);

  // anti spike
  if(lastValidPrice){
   let diff=Math.abs(price-lastValidPrice)/lastValidPrice;
   if(diff>0.03)return;
  }
  lastValidPrice=price;

  let text=price.toFixed(4);

  if(userBasePrice){
   let percent=((price-userBasePrice)/userBasePrice)*100;
   text+=` (${percent>=0?"+":""}${percent.toFixed(2)}%)`;
   output.style.color=percent>=0?"#00ff00":"#ff5555";
  }else output.style.color="#fff";

  output.textContent=text+" (MEXC)";
  document.title=text;

  updateFavicon(price);
 };
}

// ===== BINANCE =====
function connectBinance(){
 if(binanceWS)binanceWS.close();
 binanceWS=new WebSocket("wss://stream.binance.com:9443/ws/xrpusdt@trade");

 binanceWS.onmessage=e=>{
  let d=JSON.parse(e.data);
  document.getElementById("binance").innerText=d.p+" (Binance)";
 };
}

// ===== RECONNECT =====
function reconnectAll(){
 connectWS();
 connectBinance();
}

// ===== CHART =====
async function loadChart(){
 try{
  let res=await fetch(LOG_URL+"?t="+Date.now());
  let txt=await res.text();

  let labels=[],data=[];
  txt.split("\n").forEach(l=>{
   let p=l.split("|");
   if(p.length===2){
    labels.push(p[0].trim());
    data.push(parseFloat(p[1]));
   }
  });

  if(!data.length)return;

  let base=data[0];
  let profit=data.map(v=>v-base);

  if(!chart){
   chart=new Chart(ctx,{
    type:"line",
    data:{labels,
     datasets:[{data:profit,borderWidth:2}]
    }
   });
  }else{
   chart.data.labels=labels;
   chart.data.datasets[0].data=profit;
   chart.update();
  }

 }catch{}
}

// ===== INIT =====
reconnectAll();
loadChart();
setInterval(loadChart,600000);
</script>

</body>
</html>
