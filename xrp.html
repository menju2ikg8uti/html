<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="favicon" rel="icon">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  input {
    font-size: 1rem;
    padding: 5px;
    margin-bottom: 5px;
    width: 150px;
    text-align: center;
  }

  button {
    font-size: 0.9rem;
    padding: 5px 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  pre {
    font-size: 2rem;
    margin: 10px 0 5px 0;
  }

  .sub-price {
    font-size: 1rem;
    margin: 2px 0;
    color: #aaaaaa;
  }

  canvas {
    max-width: 900px;
    width: 100%;
  }
</style>
</head>
<body>

<h3>XRP/USDT</h3>

<input id="basePrice" type="number" step="0.0001" placeholder="Base">
<input id="targetUp" type="number" step="0.0001" placeholder="Target Atas">
<input id="targetDown" type="number" step="0.0001" placeholder="Target Bawah">

<button id="confirmBtn">Confirm</button>
<button id="reconnectBtn">Reconnect</button>

<pre id="output">Connecting...</pre>
<div id="binance" class="sub-price">Binance: ...</div>

<script>
let userBasePrice = null;
let targetUp = null;
let targetDown = null;
let hitState = null;

let mexcWS = null;
let binanceWS = null;

const output = document.getElementById("output");
const baseInput = document.getElementById("basePrice");
const upInput = document.getElementById("targetUp");
const downInput = document.getElementById("targetDown");

const favicon = document.getElementById("favicon");

// ===== FAVICON =====
function createFavicon(color) {
    const canvas = document.createElement("canvas");
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(32, 32, 30, 0, Math.PI * 2);
    ctx.fill();

    return canvas.toDataURL("image/png");
}

function setFavicon(color) {
    favicon.href = createFavicon(color);
}

// ===== INPUT =====
function setInputs() {
    userBasePrice = parseFloat(baseInput.value) || null;
    targetUp = parseFloat(upInput.value) || null;
    targetDown = parseFloat(downInput.value) || null;

    hitState = null; // reset trigger
}

document.getElementById("confirmBtn").onclick = setInputs;

// ===== ICON LOGIC =====
function updateFavicon(price) {
    // trigger lock
    if (hitState === null) {
        if (targetUp && price >= targetUp) hitState = "up";
        if (targetDown && price <= targetDown) hitState = "down";
    }

    if (hitState === "up") {
        setFavicon("#00ff00");
        return;
    }

    if (hitState === "down") {
        setFavicon("#ff0000");
        return;
    }

    if (userBasePrice) {
        let percent = (price - userBasePrice) / userBasePrice;
        setFavicon(percent >= 0 ? "#00aa00" : "#aa0000");
        return;
    }

    setFavicon("#000000");
}

// ===== MEXC (STABLE PARSE) =====
function connectMEXC() {
    if (mexcWS) mexcWS.close();

    mexcWS = new WebSocket("wss://wbs-api.mexc.com/ws");

    mexcWS.onopen = () => {
        mexcWS.send(JSON.stringify({
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@100ms@XRPUSDT"]
        }));
    };

    mexcWS.onmessage = async (event) => {
        let raw = event.data instanceof Blob ? await event.data.text() : event.data;

        // ambil semua angka desimal
        const matches = raw.match(/\d+\.\d+/g);
        if (!matches) return;

        // filter range harga XRP
        const filtered = matches
            .map(v => parseFloat(v))
            .filter(v => v > 0.1 && v < 5);

        if (filtered.length === 0) return;

        const price = filtered[filtered.length - 1];

        let text = price.toFixed(4);

        if (userBasePrice) {
            const percent = ((price - userBasePrice) / userBasePrice) * 100;
            const sign = percent >= 0 ? "+" : "";
            text += ` (${sign}${percent.toFixed(2)}%)`;

            output.style.color = percent >= 0 ? "#00ff00" : "#ff5555";
        } else {
            output.style.color = "#ffffff";
        }

        output.textContent = text + " (MEXC)";
        document.title = text;

        updateFavicon(price);
    };
}

// ===== BINANCE =====
function connectBinance() {
    if (binanceWS) binanceWS.close();

    binanceWS = new WebSocket("wss://stream.binance.com:9443/ws/xrpusdt@trade");

    binanceWS.onmessage = (e) => {
        let data = JSON.parse(e.data);
        let price = parseFloat(data.p).toFixed(4);
        document.getElementById("binance").innerText = price + " (Binance)";
    };
}

// ===== RECONNECT =====
function reconnectAll() {
    connectMEXC();
    connectBinance();
}

document.getElementById("reconnectBtn").onclick = reconnectAll;

// ===== INIT =====
reconnectAll();
</script>

</body>
</html>
