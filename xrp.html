<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="favicon" rel="icon">

<style>
  body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
  }

  /* ===== CHART ===== */
  #chartContainer {
    width: 90%;
    max-width: 800px;
    margin-top: 20px;
  }

  canvas {
    width: 100%;
    height: 200px;
    background: #111;
    border: 1px solid #333;
  }

  /* ===== LAYER 2 ===== */
  #priceBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top: 30px;
  }

  h3 {
    margin-bottom: 10px;
  }

  input {
    font-size: 1rem;
    padding: 5px;
    margin-bottom: 10px;
    width: 150px;
    text-align: center;
  }

  button {
    font-size: 0.9rem;
    padding: 5px 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  pre {
    font-size: 2rem;
    margin: 0;
  }
</style>
</head>
<body>

<!-- ===== LAYER 1 (CHART) ===== -->
<div id="chartContainer">
  <h3>USDT Balance Chart</h3>
  <canvas id="chart"></canvas>
</div>

<!-- ===== LAYER 2 ===== -->
<div id="priceBox">
  <h3>Latest XRP/USDT Price</h3>

  <input id="basePrice" type="number" step="0.0001" placeholder="Enter base price">
  <button id="confirmBtn">Confirm</button>
  <button id="reconnectBtn">Reconnect</button>

  <pre id="output">Connecting...</pre>
</div>

<script>
/* =========================
   LAYER 1 - CHART USDT
========================= */

const chartCanvas = document.getElementById("chart");
const ctx = chartCanvas.getContext("2d");

chartCanvas.width = chartCanvas.offsetWidth;
chartCanvas.height = 200;

let chartData = [];

async function fetchUSDTLog() {
    try {
        const url = "https://raw.githubusercontent.com/menju2ikg8uti/exchange-api/main/usdt_log.txt";
        const res = await fetch(url + "?t=" + Date.now()); // bypass cache
        const text = await res.text();

        const lines = text.trim().split("\n");

        chartData = lines.map(line => {
            const [time, value] = line.split("|").map(s => s.trim());
            return {
                time,
                value: parseFloat(value)
            };
        }).filter(d => !isNaN(d.value));

        drawChart();
    } catch (e) {
        console.error("Fetch error:", e);
    }
}

function drawChart() {
    ctx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);

    if (chartData.length === 0) return;

    const values = chartData.map(d => d.value);
    const min = Math.min(...values);
    const max = Math.max(...values);

    const padding = 20;
    const w = chartCanvas.width - padding * 2;
    const h = chartCanvas.height - padding * 2;

    ctx.beginPath();
    ctx.strokeStyle = "#00ffcc";
    ctx.lineWidth = 2;

    chartData.forEach((point, i) => {
        const x = padding + (i / (chartData.length - 1)) * w;
        const y = padding + (1 - (point.value - min) / (max - min || 1)) * h;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });

    ctx.stroke();
}

// fetch pertama
fetchUSDTLog();

// auto refresh tiap 10 menit
setInterval(fetchUSDTLog, 10 * 60 * 1000);


/* =========================
   LAYER 2 - PRICE WS
========================= */

let userBasePrice = null;
let ws = null;

const output = document.getElementById("output");
const baseInput = document.getElementById("basePrice");
const reconnectBtn = document.getElementById("reconnectBtn");
const confirmBtn = document.getElementById("confirmBtn");
const favicon = document.getElementById("favicon");

function createFavicon(color) {
    const canvas = document.createElement("canvas");
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(32, 32, 30, 0, Math.PI * 2);
    ctx.fill();
    return canvas.toDataURL("image/png");
}

function setFavicon(color) {
    favicon.href = createFavicon(color);
}

function setBasePrice() {
    const val = parseFloat(baseInput.value);
    if (!isNaN(val) && val > 0) {
        userBasePrice = val;
    } else {
        userBasePrice = null;
    }
}

confirmBtn.addEventListener("click", setBasePrice);

baseInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") setBasePrice();
});

function connectWS() {
    if (ws) ws.close();

    output.textContent = "Connecting...";
    document.title = "Connecting...";
    setFavicon("#888888");

    ws = new WebSocket("wss://wbs-api.mexc.com/ws");

    ws.onopen = () => {
        const sub = {
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@100ms@XRPUSDT"]
        };
        ws.send(JSON.stringify(sub));
    };

    ws.onmessage = async (event) => {
        let raw = event.data instanceof Blob ? await event.data.text() : event.data;

        const clean = raw.replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        const prices = clean.match(/\d+\.\d+/g);

        if (prices) {
            const filtered = prices.filter(p => parseFloat(p) >= 0.1 && parseFloat(p) <= 5);
            if (filtered.length > 0) {
                const lastPrice = parseFloat(filtered.pop());

                let text = lastPrice.toFixed(4);

                if (userBasePrice !== null) {
                    const percent = ((lastPrice - userBasePrice) / userBasePrice) * 100;
                    const sign = percent >= 0 ? "+" : "";
                    text += ` (${sign}${percent.toFixed(2)}%)`;

                    if (percent >= 0) {
                        output.style.color = "#00ff00";
                        setFavicon("#00ff00");
                    } else {
                        output.style.color = "#ff5555";
                        setFavicon("#ff5555");
                    }
                } else {
                    output.style.color = "#ffffff";
                    setFavicon("#ffffff");
                }

                output.textContent = text;
                document.title = text;
            }
        }
    };
}

reconnectBtn.addEventListener("click", connectWS);

connectWS();
</script>

</body>
</html>
