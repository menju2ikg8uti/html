<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>

<link id="fav1" rel="icon">
<link id="fav2" rel="icon">
<link id="fav3" rel="icon">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  input {
    font-size: 1rem;
    padding: 5px;
    margin-bottom: 5px;
    width: 150px;
    text-align: center;
  }

  button {
    font-size: 0.9rem;
    padding: 5px 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  pre {
    font-size: 2rem;
    margin: 10px 0 5px 0;
  }

  .sub-price {
    font-size: 1rem;
    margin: 2px 0;
    color: #aaaaaa;
  }

  canvas {
    max-width: 900px;
    width: 100%;
  }
</style>
</head>
<body>

<h3>XRP/USDT</h3>

<input id="basePrice" type="number" step="0.0001" placeholder="Base">
<input id="targetUp" type="number" step="0.0001" placeholder="Target Atas">
<input id="targetDown" type="number" step="0.0001" placeholder="Target Bawah">

<button id="confirmBtn">Confirm</button>
<button id="reconnectBtn">Reconnect</button>

<pre id="output">Connecting...</pre>

<div id="binance" class="sub-price">Binance: ...</div>

<canvas id="chart"></canvas>

<script>
let userBasePrice = null;
let targetUp = null;
let targetDown = null;

let wsMEXC = null;
let wsBINANCE = null;

const output = document.getElementById("output");

const fav1 = document.getElementById("fav1"); // persen
const fav2 = document.getElementById("fav2"); // target atas
const fav3 = document.getElementById("fav3"); // target bawah

function createFavicon(color) {
    const canvas = document.createElement("canvas");
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(16, 16, 14, 0, Math.PI * 2);
    ctx.fill();

    return canvas.toDataURL();
}

function setFavicons(percentColor, upColor, downColor) {
    fav1.href = createFavicon(percentColor);
    fav2.href = createFavicon(upColor);
    fav3.href = createFavicon(downColor);
}

function setValues() {
    userBasePrice = parseFloat(basePrice.value) || null;
    targetUp = parseFloat(document.getElementById("targetUp").value) || null;
    targetDown = parseFloat(document.getElementById("targetDown").value) || null;
}

confirmBtn.onclick = setValues;

// ===== MEXC =====
function connectMEXC() {
    if (wsMEXC) wsMEXC.close();

    wsMEXC = new WebSocket("wss://wbs-api.mexc.com/ws");

    wsMEXC.onopen = () => {
        wsMEXC.send(JSON.stringify({
            method: "SUBSCRIPTION",
            params: ["spot@public.aggre.deals.v3.api.pb@100ms@XRPUSDT"]
        }));
    };

    wsMEXC.onmessage = async (event) => {
        let raw = event.data instanceof Blob ? await event.data.text() : event.data;
        const clean = raw.replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        const prices = clean.match(/\d+\.\d+/g);

        if (!prices) return;

        const price = parseFloat(prices[prices.length - 1]);

        let text = price.toFixed(4);

        let percentColor = "#ffffff";
        let upColor = "#000000";
        let downColor = "#000000";

        if (userBasePrice) {
            let p = ((price - userBasePrice) / userBasePrice) * 100;
            text += ` (${p.toFixed(2)}%)`;

            percentColor = p >= 0 ? "#00ff00" : "#ff0000";
        }

        if (targetUp && price >= targetUp) {
            upColor = "#00ff00";
        }

        if (targetDown && price <= targetDown) {
            downColor = "#ff0000";
        }

        setFavicons(percentColor, upColor, downColor);

        output.textContent = text + " (MEXC)";
        document.title = text;
    };
}

// ===== BINANCE =====
function connectBINANCE() {
    if (wsBINANCE) wsBINANCE.close();

    wsBINANCE = new WebSocket("wss://stream.binance.com:9443/ws/xrpusdt@trade");

    wsBINANCE.onmessage = (e) => {
        let data = JSON.parse(e.data);
        document.getElementById("binance").innerText =
            parseFloat(data.p).toFixed(4) + " (Binance)";
    };
}

// ===== RECONNECT ALL =====
function reconnectAll() {
    connectMEXC();
    connectBINANCE();
}

reconnectBtn.onclick = reconnectAll;

// ===== INIT =====
reconnectAll();
</script>

</body>
</html>
